</head>
<body>

  <!-- smoke layer -->
  <svg class="smoke" viewBox="0 0 1000 800" preserveAspectRatio="xMidYMax slice" aria-hidden="true">
    <defs>
      <radialGradient id="puff" cx="50%" cy="50%" r="50%">
        <stop offset="0%" stop-color="#f5e9cf" stop-opacity="0.16" />
        <stop offset="60%" stop-color="#f5e9cf" stop-opacity="0.04" />
        <stop offset="100%" stop-color="#f5e9cf" stop-opacity="0" />
      </radialGradient>
    </defs>
    <g class="smoke-group">
      <circle class="puff p1" cx="120" cy="760" r="90"  fill="url(#puff)" />
      <circle class="puff p2" cx="320" cy="780" r="120" fill="url(#puff)" />
      <circle class="puff p3" cx="540" cy="770" r="100" fill="url(#puff)" />
      <circle class="puff p4" cx="760" cy="790" r="140" fill="url(#puff)" />
      <circle class="puff p5" cx="900" cy="760" r="80"  fill="url(#puff)" />
    </g>
  </svg>

  <header class="hero">
    <div class="hero-inner">
      <!-- spinning vinyl -->
      <svg class="hero-vinyl" viewBox="0 0 200 200" aria-hidden="true">
        <defs>
          <radialGradient id="vinylGrad" cx="50%" cy="50%" r="50%">
            <stop offset="0%" stop-color="#1a1208" />
            <stop offset="70%" stop-color="#0a0603" />
            <stop offset="100%" stop-color="#000" />
          </radialGradient>
          <radialGradient id="vinylGleam" cx="30%" cy="24%" r="52%">
            <stop offset="0%"   stop-color="#ffb347" stop-opacity="0.22" />
            <stop offset="45%"  stop-color="#ff6b1a" stop-opacity="0.08" />
            <stop offset="100%" stop-color="#ff6b1a" stop-opacity="0" />
          </radialGradient>
        </defs>
        <g class="vinyl-spin">
          <circle cx="100" cy="100" r="98" fill="url(#vinylGrad)" />
          <!-- grooves -->
          <g fill="none" stroke="#2a1a0f" stroke-width="0.6" opacity="0.9">
            <circle cx="100" cy="100" r="92" />
            <circle cx="100" cy="100" r="86" />
            <circle cx="100" cy="100" r="80" />
            <circle cx="100" cy="100" r="74" />
            <circle cx="100" cy="100" r="68" />
            <circle cx="100" cy="100" r="62" />
            <circle cx="100" cy="100" r="56" />
            <circle cx="100" cy="100" r="50" />
          </g>
          <!-- subtle off-center gleam that rotates with the disc -->
          <circle cx="100" cy="100" r="98" fill="url(#vinylGleam)" />
          <!-- soft arcs, just enough to read rotation -->
          <path d="M 32,72 A 80,80 0 0 1 96,22" fill="none" stroke="#ffb347" stroke-width="1.6" stroke-linecap="round" opacity="0.4" />
          <path d="M 46,148 A 78,78 0 0 0 70,172" fill="none" stroke="#ff6b1a" stroke-width="1.0" stroke-linecap="round" opacity="0.25" />
          <!-- label -->
          <circle cx="100" cy="100" r="32" fill="#ff3fb5" />
          <circle cx="100" cy="100" r="32" fill="none" stroke="#ffb347" stroke-width="0.8" />
          <text x="100" y="96" text-anchor="middle" font-family="Alfa Slab One, serif" font-size="9" fill="#120d08">GROOVES</text>
          <text x="100" y="108" text-anchor="middle" font-family="VT323, monospace" font-size="8" fill="#120d08">est. 2026</text>
          <circle cx="100" cy="100" r="3" fill="#120d08" />
        </g>
      </svg>

      <div class="hero-text">
        <h1 class="wordmark">grooves<span class="dot">.</span></h1>
        <p class="tagline"><span id="type"></span><span class="cursor">_</span></p>
        <p class="stats" id="stats">&nbsp;</p>
      </div>
    </div>

    <!-- groove-ring divider -->
    <svg class="divider" viewBox="0 0 1000 40" aria-hidden="true" preserveAspectRatio="none">
      <line x1="0" y1="20" x2="1000" y2="20" stroke="#ff6b1a" stroke-width="1" opacity="0.4" />
      <line x1="0" y1="22" x2="1000" y2="22" stroke="#ff3fb5" stroke-width="0.5" opacity="0.5" />
      <line x1="0" y1="18" x2="1000" y2="18" stroke="#00f6ff" stroke-width="0.5" opacity="0.4" />
    </svg>
  </header>

  <div class="toolbar">
    <div class="search-wrap">
      <span class="prompt">&gt;</span>
      <input id="search" type="text" placeholder="search title or artist..." autocomplete="off" spellcheck="false" />
      <span class="blink">_</span>
    </div>
    <button id="shuffle" class="btn-shuffle" title="toss the stack">
      <svg viewBox="0 0 24 24" width="18" height="18" aria-hidden="true">
        <path d="M4 7h4l10 10h3M4 17h4l3-3M14 10l4-3h3" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        <path d="M18 4l3 3-3 3M18 14l3 3-3 3" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
      <span>shuffle</span>
    </button>
  </div>

  <main id="stacks" class="stacks"><!-- artist groups inject here --></main>

  <footer class="footer">
    <div class="ticker">
      <span class="ticker-label">&gt; now spinning:</span>
      <span class="ticker-track" id="ticker"></span>
    </div>
    <div class="legal">
      <span>&copy; 2026 &middot; ai-rolled reefer &middot; no trackers &middot; no cookies &middot; refresh for groovy vibes</span>
      <span class="visitors">you are visitor <span id="counter">0000001</span></span>
    </div>
    <!-- shag carpet fringe -->
    <svg class="shag" viewBox="0 0 1200 24" preserveAspectRatio="none" aria-hidden="true">

    </svg>
  </footer>
